<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | escape }}</title>
  <meta name="description" content="{{ page.description | escape }}">
  <link rel="canonical" href="https://nightwatchman.dev{{ page.canonical_path }}">
  <meta property="og:title" content="{{ page.title | escape }}">
  <meta property="og:description" content="{{ page.description | escape }}">
  <meta property="og:type" content="{% if page.schema_type == 'Article' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="https://nightwatchman.dev{{ page.canonical_path }}">
  <meta property="og:image" content="https://nightwatchman.dev/assets/og-night-watchman.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | escape }}">
  <meta name="twitter:description" content="{{ page.description | escape }}">
  <meta name="twitter:image" content="https://nightwatchman.dev/assets/og-night-watchman.png">
  {% if page.schema_type == 'FAQPage' %}
  <script type="application/ld+json">{{ page.faq_json_ld }}</script>
  {% elsif page.schema_type == 'Article' %}
  <script type="application/ld+json">{
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | jsonify }},
    "datePublished": "{{ page.datePublished }}",
    "author": {"@type": "Organization", "name": "ssddee labs"},
    "url": "https://nightwatchman.dev{{ page.canonical_path }}",
    "image": "https://nightwatchman.dev/assets/og-night-watchman.png"
  }</script>
  {% endif %}
  <style>
    :root{--bg:#0a0a0b;--ink:#f4f1e8;--muted:#a8aaa3;--line:#2a2c2f;--accent:#4ade80;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;--sans:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    *{box-sizing:border-box}html{background:var(--bg);color:var(--ink)}body{margin:0;font-family:var(--sans);line-height:1.65;background:radial-gradient(circle at 20% 0%,rgba(74,222,128,.06),transparent 28rem),var(--bg);color:var(--ink)}
    a{color:var(--accent)}.wrap{width:min(880px,calc(100% - 32px));margin:0 auto}.site-header{position:sticky;top:0;z-index:100;background:rgba(10,10,11,.94);border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(18px)}
    .nav{min-height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{font-family:var(--mono);text-decoration:none;color:var(--ink);display:flex;gap:10px;align-items:center}.dot{width:10px;height:10px;border-radius:999px;background:var(--accent);box-shadow:0 0 0 6px rgba(74,222,128,.1)}
    .navlinks{display:flex;gap:16px;align-items:center;font-size:14px}.navlinks a{text-decoration:none;color:var(--muted)}.navlinks a:hover{color:var(--ink)}.button{display:inline-flex;align-items:center;min-height:40px;padding:0 14px;border-radius:999px;background:var(--accent);color:#071008!important;font-weight:700;text-decoration:none!important}
    main{padding:56px 0 80px}article{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:20px;padding:clamp(22px,4vw,44px)}
    h1,h2,h3{line-height:1.1;letter-spacing:-.04em}h1{font-size:clamp(34px,6vw,58px);margin:0 0 20px}h2{font-size:clamp(26px,4vw,36px);margin-top:44px}p,li{color:#d8d5cb}table{width:100%;border-collapse:collapse;display:block;overflow-x:auto}th,td{border:1px solid var(--line);padding:10px;text-align:left}pre,code{font-family:var(--mono);white-space:pre-wrap;word-break:break-all;overflow-wrap:anywhere;max-width:100%;box-sizing:border-box}pre{background:#08090a;border:1px solid var(--line);border-radius:14px;padding:16px;overflow-x:auto;color:#d8d5cb}.footer{padding:34px 0;color:var(--muted);border-top:1px solid rgba(255,255,255,.08)}
    @media(max-width:720px){.navlinks a:not(.button){display:none}main{padding-top:34px}}
  </style>
</head>
<body>
<header class="site-header"><div class="wrap nav"><a class="brand" href="/"><span class="dot" aria-hidden="true"></span><span>Night Watchman</span></a><nav class="navlinks"><a href="/#learn">Docs</a><a href="/#install">Install</a><a class="button" href="https://github.com/ssddee-dev/code-batman" rel="noopener">Star on GitHub</a></nav></div></header>
<main class="wrap"><article>{{ content }}</article></main>
<footer class="footer"><div class="wrap">Night Watchman · <a href="https://github.com/ssddee-dev/code-batman">GitHub</a> · <a href="https://youtu.be/ORbqkw7nBfU">Demo</a></div></footer>
</body>
</html>
